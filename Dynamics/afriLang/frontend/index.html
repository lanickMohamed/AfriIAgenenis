<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfrIAgenesis — IA Langues Africaines</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lanickMohamed/AfriIAgenenis/main/assets/images/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles/index.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <img src="https://raw.githubusercontent.com/lanickMohamed/AfriIAgenenis/main/assets/images/logo.jpg" alt="logo afrIAgenesis">
      </div>
      <div>
        <div class="logo-text">afrIAgenesis®</div>
        <div class="logo-sub">Intelligence Artificielle Africaine</div>
      </div>
    </div>
  </header>

  <!-- LEFT — phrases -->
  <aside class="panel-left">
    <div class="panel-title">Expressions en Fon</div>
    <div class="phrases-list" id="phrases-list"></div>
  </aside>

  <!-- CENTER -->
  <main class="center">

    <!-- avatar bottom center -->
    <div class="avatar-zone">
      <div class="avatar-ring" id="avatar-ring"></div>
      <img
        class="avatar-img"
        src="assets/images/avatar1.png"
        alt="Avatar IA"
      />
      <div class="avatar-status" id="avatar-status">.....</div>
    </div>

  </main>

  <!-- RIGHT — scénario -->
  <aside class="panel-right">

    <div class="panel-title">Scénario</div>

    <div class="speech-bubble" id="speech-bubble">
      <div class="bubble-lang">Fon — Langue du Bénin</div>
      <div class="bubble-text-fon" id="bubble-fon">
        Sélectionnez une expression pour commencer…
      </div>
      <div class="bubble-divider"></div>
      <div class="bubble-text-fr" id="bubble-fr">
        Traduction française
      </div>
      <div class="bubble-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="scenario-img-wrap" id="scenario-img-wrap">
      <div class="scenario-placeholder" id="scenario-placeholder">
        <div class="scenario-icon">🌍</div>
        <div>L'image du scénario s'affichera ici selon l'expression sélectionnée</div>
      </div>
      <img id="scenario-img" src="" alt=""
       />
      <div class="scenario-overlay">
        <div class="scenario-label" id="scenario-label">—</div>
        <div class="scenario-desc" id="scenario-desc">Cliquez sur une expression à gauche</div>
      </div>
    </div>
  </aside>

  <script src="scripts/index.js"></script>
</body>
</html>
